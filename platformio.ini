; PlatformIO Project Configuration File
; Battery Experiments — ESP32 firmware for Chapter 4 experiments

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
build_unflags = -std=gnu++11

lib_deps =
    adafruit/Adafruit INA219@^1.2.3
    https://github.com/switchdoclabs/SDL_Arduino_INA3221.git
    olikraus/U8g2@^2.34.22
    bblanchon/ArduinoJson@^7.0.4
    esphome/ESPAsyncWebServer-esphome@^3.2.2
    esphome/AsyncTCP-esphome@^2.1.4
    mathworks/ThingSpeak@^2.1.1

; OTA upload — uncomment after first USB upload:
; upload_protocol = espota
; upload_port = 192.168.1.42

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DUNIT_TEST
test_build_src = true
build_src_filter =
    -<*>
    +<SOCEstimator.cpp>
